{% extends 'accounts/auth_base.html' %}

{% block title %}Create Manager | CRMbles{% endblock %}
{% block heading %}Create Manager Account{% endblock %}
{% block subheading %}This account gets full access to its own workspace.{% endblock %}

{% block content %}
<form method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 18px;">
    {% csrf_token %}
    <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label" for="business_name">Workspace Name</label>
        <input class="form-control" type="text" name="business_name" id="business_name" autocomplete="organization" placeholder="Your business or project name">
    </div>
    <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label" for="username">Username *</label>
        <input class="form-control" type="text" name="username" id="username" required autofocus autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" name="email" id="email" autocomplete="email">
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label" for="first_name">First Name</label>
            <input class="form-control" type="text" name="first_name" id="first_name" autocomplete="given-name">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label" for="last_name">Last Name</label>
            <input class="form-control" type="text" name="last_name" id="last_name" autocomplete="family-name">
        </div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label" for="phone_number">Phone</label>
            <input class="form-control" type="tel" name="phone_number" id="phone_number" autocomplete="tel">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label" for="office">Office</label>
            <input class="form-control" type="text" name="office" id="office" autocomplete="organization-title">
        </div>
    </div>
    <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label" for="photo">Profile Photo</label>
        <input class="form-control" type="file" name="photo" id="photo" accept="image/png,image/jpeg,image/gif,image/webp">
    </div>
    <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label" for="password1">Password *</label>
        <div class="password-field">
            <input class="form-control" type="password" name="password1" id="password1" required autocomplete="new-password">
            <button type="button" class="password-toggle" aria-label="Show password" onclick="togglePasswordVisibility('password1', this)">
                <i class="fa-regular fa-eye"></i>
            </button>
        </div>
    </div>
    <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label" for="password2">Confirm Password *</label>
        <div class="password-field">
            <input class="form-control" type="password" name="password2" id="password2" required autocomplete="new-password">
            <button type="button" class="password-toggle" aria-label="Show password" onclick="togglePasswordVisibility('password2', this)">
                <i class="fa-regular fa-eye"></i>
            </button>
        </div>
    </div>
    <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 4px;">
        <i class="fa-solid fa-user-shield"></i> Create Manager
    </button>
</form>
{% endblock %}
