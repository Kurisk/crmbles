{% extends 'accounts/auth_base.html' %}

{% block title %}Create Manager | CRMbles{% endblock %}
{% block heading %}Create Manager Account{% endblock %}
{% block subheading %}This first account gets full workspace access.{% endblock %}

{% block content %}
<form method="POST" style="display: flex; flex-direction: column; gap: 18px;">
    {% csrf_token %}
    <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label" for="username">Username *</label>
        <input class="form-control" type="text" name="username" id="username" required autofocus autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" name="email" id="email" autocomplete="email">
    </div>
    <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label" for="password1">Password *</label>
        <input class="form-control" type="password" name="password1" id="password1" required autocomplete="new-password">
    </div>
    <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label" for="password2">Confirm Password *</label>
        <input class="form-control" type="password" name="password2" id="password2" required autocomplete="new-password">
    </div>
    <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 4px;">
        <i class="fa-solid fa-user-shield"></i> Create Manager
    </button>
</form>
{% endblock %}
