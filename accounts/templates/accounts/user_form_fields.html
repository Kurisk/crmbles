<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}Username">Username *</label>
        <input class="form-control" id="{{ prefix }}Username" name="username" type="text" required autocomplete="off">
    </div>
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}Email">Email</label>
        <input class="form-control" id="{{ prefix }}Email" name="email" type="email" autocomplete="off">
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}FirstName">First Name</label>
        <input class="form-control" id="{{ prefix }}FirstName" name="first_name" type="text" autocomplete="off">
    </div>
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}LastName">Last Name</label>
        <input class="form-control" id="{{ prefix }}LastName" name="last_name" type="text" autocomplete="off">
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}Password">{% if is_create %}Password *{% else %}New Password{% endif %}</label>
        <div class="password-field">
            <input class="form-control" id="{{ prefix }}Password" name="password" type="password" {% if is_create %}required{% endif %} autocomplete="new-password" placeholder="{% if is_create %}Required{% else %}Leave blank to keep current{% endif %}">
            <button type="button" class="password-toggle" aria-label="Show password" onclick="togglePasswordVisibility('{{ prefix }}Password', this)">
                <i class="fa-regular fa-eye"></i>
            </button>
        </div>
    </div>
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}Role">Role</label>
        <select class="form-control" id="{{ prefix }}Role" name="role" onchange="togglePermissionPanel('{{ prefix }}')" style="background-color: var(--bg-sidebar); border-color: var(--border-color); color: var(--text-primary);">
            {% for code, label in roles %}
            <option value="{{ code }}" {% if is_create and code == 'USER' %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}Photo">Profile Photo</label>
        <input class="form-control" id="{{ prefix }}Photo" name="photo" type="file" accept="image/png,image/jpeg,image/gif,image/webp">
    </div>
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}JobTitle">Job Title</label>
        <input class="form-control" id="{{ prefix }}JobTitle" name="job_title" type="text" autocomplete="off">
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}Office">Office</label>
        <input class="form-control" id="{{ prefix }}Office" name="office" type="text" autocomplete="off">
    </div>
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}PhoneNumber">Phone Number</label>
        <input class="form-control" id="{{ prefix }}PhoneNumber" name="phone_number" type="tel" autocomplete="off">
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}MobileNumber">Mobile Number</label>
        <input class="form-control" id="{{ prefix }}MobileNumber" name="mobile_number" type="tel" autocomplete="off">
    </div>
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}Team">Team</label>
        <input class="form-control" id="{{ prefix }}Team" name="team" type="text" autocomplete="off">
    </div>
</div>

<div class="form-group">
    <label class="form-label" for="{{ prefix }}Supervisor">Supervisor</label>
    <select class="form-control" id="{{ prefix }}Supervisor" name="supervisor" style="background-color: var(--bg-sidebar); border-color: var(--border-color); color: var(--text-primary);">
        <option value="">No supervisor</option>
        {% for supervisor in supervisor_options %}
        <option value="{{ supervisor.id }}">{{ supervisor.get_full_name|default:supervisor.username }}</option>
        {% endfor %}
    </select>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}AddressLine1">Address Line 1</label>
        <input class="form-control" id="{{ prefix }}AddressLine1" name="address_line1" type="text" autocomplete="off">
    </div>
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}AddressLine2">Address Line 2</label>
        <input class="form-control" id="{{ prefix }}AddressLine2" name="address_line2" type="text" autocomplete="off">
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}City">City</label>
        <input class="form-control" id="{{ prefix }}City" name="city" type="text" autocomplete="off">
    </div>
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}State">State</label>
        <input class="form-control" id="{{ prefix }}State" name="state" type="text" autocomplete="off">
    </div>
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}PostalCode">Postal Code</label>
        <input class="form-control" id="{{ prefix }}PostalCode" name="postal_code" type="text" autocomplete="off">
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}Country">Country</label>
        <input class="form-control" id="{{ prefix }}Country" name="country" type="text" value="United States" autocomplete="off">
    </div>
    <div class="form-group">
        <label class="form-label" for="{{ prefix }}EmergencyContactName">Emergency Contact</label>
        <input class="form-control" id="{{ prefix }}EmergencyContactName" name="emergency_contact_name" type="text" autocomplete="off">
    </div>
</div>

<div class="form-group">
    <label class="form-label" for="{{ prefix }}EmergencyContactPhone">Emergency Contact Phone</label>
    <input class="form-control" id="{{ prefix }}EmergencyContactPhone" name="emergency_contact_phone" type="tel" autocomplete="off">
</div>

<label class="tag-selector-pill" style="cursor: pointer; display: block; margin-bottom: 18px;">
    <input id="{{ prefix }}IsActive" type="checkbox" name="is_active" checked style="display: none;">
    <span style="display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--border-color); color: var(--text-secondary); padding: 10px 14px; border-radius: var(--radius-sm); font-weight: 700; font-size: 0.82rem;">
        <i class="fa-solid fa-circle-check" style="color: var(--success);"></i> Account Active
    </span>
</label>

<div style="border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 16px; background-color: rgba(15, 21, 36, 0.6); margin-top: 16px;">
    <label class="form-label" style="margin-bottom: 12px; display: block;">Business Access</label>
    <p style="font-size: 0.78rem; color: var(--text-muted); line-height: 1.45; margin: -4px 0 14px;">
        Add this person to one or more businesses, then choose what they can access inside each business. Only Managers can manage Businesses or Accounts.
    </p>
    {% if businesses %}
    <div style="display: flex; flex-direction: column; gap: 12px;">
        {% for business in businesses %}
        <div style="border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 12px;">
            <label style="display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--text-primary); font-size: 0.88rem; margin-bottom: 10px;">
                <input id="{{ prefix }}Business{{ business.id }}" class="{{ prefix }}-business-assignment" type="checkbox" name="businesses" value="{{ business.id }}">
                {{ business }}
            </label>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; font-size: 0.76rem; color: var(--text-secondary);">
                <label><input id="{{ prefix }}Business{{ business.id }}Projects" class="{{ prefix }}-business-permission" type="checkbox" name="business_{{ business.id }}_projects"> Projects</label>
                <label><input id="{{ prefix }}Business{{ business.id }}Documents" class="{{ prefix }}-business-permission" type="checkbox" name="business_{{ business.id }}_documents"> Documents</label>
                <label><input id="{{ prefix }}Business{{ business.id }}Vendors" class="{{ prefix }}-business-permission" type="checkbox" name="business_{{ business.id }}_vendors"> Vendors</label>
                <label><input id="{{ prefix }}Business{{ business.id }}Clients" class="{{ prefix }}-business-permission" type="checkbox" name="business_{{ business.id }}_clients"> Clients</label>
                <label><input id="{{ prefix }}Business{{ business.id }}Finance" class="{{ prefix }}-business-permission" type="checkbox" name="business_{{ business.id }}_finance"> Finance</label>
                <label class="{{ prefix }}-manager-access-option" style="display: none;"><input id="{{ prefix }}Business{{ business.id }}Accounts" class="{{ prefix }}-business-permission" type="checkbox" name="business_{{ business.id }}_accounts"> Accounts</label>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p style="font-size: 0.82rem; color: var(--text-muted); margin: 0;">Create a business before assigning account access.</p>
    {% endif %}
</div>
